<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #667eea;
            --secondary: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --danger: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --warning: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.1);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --text-light: #a0aec0;
            --border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius: 16px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 226, 0.3) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.03"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.03"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.02"/><circle cx="90" cy="40" r="0.5" fill="white" opacity="0.02"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            pointer-events: none;
            z-index: -1;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 600px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header-icon {
            font-size: 3rem;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            display: inline-block;
        }

        .header h1 {
            color: var(--text-primary);
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            margin: 0;
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.6;
        }

        .form-container {
            position: relative;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group label i {
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-control:hover {
            border-color: rgba(102, 126, 234, 0.3);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 16px;
            padding-right: 48px;
        }

        .input-group {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1rem;
            pointer-events: none;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit.loading {
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-container {
            margin-top: 32px;
            display: none;
        }

        .result-container.show {
            display: block;
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-box {
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .result-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            padding: 2px;
            background: var(--success);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
        }

        .result-box.fraud::before {
            background: var(--danger);
        }

        .result-box .result-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .result-icon {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .result-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
        }

        .confidence-meter {
            width: 100%;
            margin-top: 16px;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .confidence-fill.safe {
            background: var(--success);
        }

        .confidence-fill.risk {
            background: var(--danger);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.8);
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .floating-shapes {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 20%;
            right: 10%;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 40px;
            height: 40px;
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 24px;
                margin: 16px;
                max-width: none;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 1rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                margin: 8px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading States */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .loading-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .loading-content {
            text-align: center;
            color: var(--text-primary);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <div class="loading-text">Analyzing claim...</div>
            </div>
        </div>

        <div class="header">
            <div class="header-icon">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Insurance Fraud Detection</h1>
            <p>Advanced AI-powered claim verification system</p>
        </div>

        <form id="fraudForm" action="/predict" method="POST">
            <div class="form-container">
                <div class="form-group">
                    <label for="months_as_customer">
                        <i class="fas fa-calendar-alt"></i>
                        Months as Customer
                    </label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="months_as_customer" name="months_as_customer" placeholder="e.g. 24" min="1" required>
                        <div class="input-icon">
                            <i class="fas fa-hashtag"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="policy_deductable">
                        <i class="fas fa-dollar-sign"></i>
                        Policy Deductible
                    </label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="policy_deductable" name="policy_deductable" placeholder="e.g. 500" min="0" step="100" required>
                        <div class="input-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="total_claim_amount">
                        <i class="fas fa-money-bill-wave"></i>
                        Total Claim Amount
                    </label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="total_claim_amount" name="total_claim_amount" placeholder="e.g. 15000" min="0" step="100" required>
                        <div class="input-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="umbrella_limit">
                        <i class="fas fa-umbrella"></i>
                        Umbrella Limit
                    </label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="umbrella_limit" name="umbrella_limit" placeholder="e.g. 0" min="0" step="10000" required>
                        <div class="input-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="number_of_vehicles_involved">
                        <i class="fas fa-car"></i>
                        Vehicles Involved
                    </label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="number_of_vehicles_involved" name="number_of_vehicles_involved" placeholder="e.g. 1" min="1" max="10" required>
                        <div class="input-icon">
                            <i class="fas fa-hashtag"></i>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="incident_severity">
                        <i class="fas fa-exclamation-triangle"></i>
                        Incident Severity
                    </label>
                    <select class="form-control" id="incident_severity" name="incident_severity" required>
                        <option value="" disabled selected>Select severity level...</option>
                        <option value="Trivial Damage">🔸 Trivial Damage</option>
                        <option value="Minor Damage">🟡 Minor Damage</option>
                        <option value="Major Damage">🟠 Major Damage</option>
                        <option value="Total Loss">🔴 Total Loss</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-search"></i>
                    Analyze Claim
                </button>
            </div>
        </form>

        <div class="result-container" id="resultContainer">
            <div class="result-box" id="resultBox">
                <div class="result-content">
                    <div class="result-icon" id="resultIcon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h3 class="result-text" id="resultText">Analysis Complete</h3>

                    <div class="confidence-meter">
                        <div class="confidence-label">
                            <span>Risk Level</span>
                            <span id="confidencePercent">0%</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" id="confidenceFill"></div>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="stat1">0</span>
                            <span class="stat-label">Months</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat2">$0</span>
                            <span class="stat-label">Deductible</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat3">$0</span>
                            <span class="stat-label">Claim</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat4">0</span>
                            <span class="stat-label">Vehicles</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Form handling and animations
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('fraudForm');
            const submitBtn = document.getElementById('submitBtn');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const resultContainer = document.getElementById('resultContainer');
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');
            const confidenceFill = document.getElementById('confidenceFill');
            const confidencePercent = document.getElementById('confidencePercent');

            // Form submission
            form.addEventListener('submit', function(e) {
                submitBtn.classList.add('loading');
                submitBtn.innerHTML = '<i class="fas fa-spinner"></i> Analyzing...';
                loadingOverlay.classList.add('show');

                // Update stats
                updateStats();
            });

            // Result display (if prediction exists)
            {% if prediction_text %}
                displayResult("{{ prediction_text }}", {{ confidence|default(0) }});
            {% endif %}

            function displayResult(prediction, confidence) {
                loadingOverlay.classList.remove('show');
                submitBtn.classList.remove('loading');
                submitBtn.innerHTML = '<i class="fas fa-search"></i> Analyze Claim';

                const isFraud = prediction.includes('Fraud');
                resultBox.className = `result-box ${isFraud ? 'fraud' : 'genuine'}`;

                if (isFraud) {
                    resultIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                    resultText.textContent = 'Fraudulent Claim Detected!';
                    confidenceFill.className = 'confidence-fill risk';
                } else {
                    resultIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                    resultText.textContent = 'Claim Appears Genuine';
                    confidenceFill.className = 'confidence-fill safe';
                }

                // Animate confidence bar
                const confidenceValue = Math.abs(confidence) * 100;
                setTimeout(() => {
                    confidenceFill.style.width = `${Math.min(confidenceValue, 100)}%`;
                    confidencePercent.textContent = `${confidenceValue.toFixed(1)}%`;
                }, 500);

                resultContainer.classList.add('show');
            }

            function updateStats() {
                document.getElementById('stat1').textContent = document.getElementById('months_as_customer').value || '0';
                document.getElementById('stat2').textContent = '$' + (document.getElementById('policy_deductable').value || '0');
                document.getElementById('stat3').textContent = '$' + (document.getElementById('total_claim_amount').value || '0');
                document.getElementById('stat4').textContent = document.getElementById('number_of_vehicles_involved').value || '0';
            }

            // Input animations
            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.parentElement.style.transform = 'translateY(-2px)';
                });

                input.addEventListener('blur', function() {
                    this.parentElement.parentElement.style.transform = 'translateY(0)';
                });
            });

            // Smooth scrolling for results
            if (resultContainer.classList.contains('show')) {
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        });
    </script>
</body>
</html>
